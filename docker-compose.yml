services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./uploads:/data/uploads
    depends_on:
      - mongo

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/resumate
      - JWT_SECRET=${JWT_SECRET:-dev-change-me-in-production}
      - AI_SERVICE_URL=http://ai-service:8000
      - CORS_ORIGIN=http://localhost:5173
      - UPLOAD_DIR=/data/uploads
    volumes:
      - ./uploads:/data/uploads
    depends_on:
      - mongo
      - ai-service

volumes:
  mongo_data:
